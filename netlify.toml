[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.gstatic.com https://cdn.tailwindcss.com https://upload-widget.cloudinary.com https://unpkg.com https://www.google.com https://www.gstatic.com/recaptcha/; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.tailwindcss.com 'unsafe-inline'; img-src 'self' https://res.cloudinary.com https://images.unsplash.com https://*.googletagmanager.com data: blob:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://firestore.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://generativelanguage.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://recaptcha.net https://www.google.com; frame-src https://charming-3dd6f.firebaseapp.com https://www.google.com https://recaptcha.net https://www.recaptcha.net; object-src 'none'; base-uri 'self'"

[[headers]]
  for = "/mgmt-7k9x.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.gstatic.com https://cdn.tailwindcss.com https://upload-widget.cloudinary.com https://unpkg.com https://www.google.com https://www.gstatic.com/recaptcha/ https://accounts.google.com https://cdn.sheetjs.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.tailwindcss.com https://accounts.google.com; img-src 'self' https://res.cloudinary.com https://images.unsplash.com https://*.googletagmanager.com data: blob:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://firestore.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://generativelanguage.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://recaptcha.net https://www.google.com https://nominatim.openstreetmap.org https://router.project-osrm.org https://unpkg.com https://api.cloudinary.com https://res.cloudinary.com https://sheets.googleapis.com https://accounts.google.com; frame-src https://charming-3dd6f.firebaseapp.com https://www.google.com https://recaptcha.net https://www.recaptcha.net https://upload-widget.cloudinary.com https://accounts.google.com; object-src 'none'; base-uri 'self'"

