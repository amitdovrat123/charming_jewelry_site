[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.gstatic.com https://cdn.tailwindcss.com https://upload-widget.cloudinary.com https://unpkg.com https://www.google.com https://www.gstatic.com/recaptcha/ 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.tailwindcss.com 'unsafe-inline'; img-src 'self' https://res.cloudinary.com https://images.unsplash.com https://*.googletagmanager.com data: blob:; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' https://firestore.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://generativelanguage.googleapis.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://recaptcha.net https://www.google.com; frame-src https://charming-3dd6f.firebaseapp.com https://www.google.com https://recaptcha.net https://www.recaptcha.net; object-src 'none'; base-uri 'self'"

[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ── Block sensitive project files ─────────────────────────────
[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/firestore.rules"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/agents/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/skills/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/_headers"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify.toml"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Universal Agents v2/*"
  to = "/404.html"
  status = 404
  force = true
